services:
  devflow:
    build:
      context: ..
      dockerfile: apps/Dockerfile
    ports:
      - "3001:3001"
    environment:
      - GITHUB_TOKEN=${GITHUB_TOKEN}
      - PORT=3001
      - DEVFLOW_USER=${DEVFLOW_USER:-admin}
      - DEVFLOW_PASS=${DEVFLOW_PASS}
      - DEVFLOW_JWT_SECRET=${DEVFLOW_JWT_SECRET}
    volumes:
      - ./projects:/app/server/projects
    restart: unless-stopped
