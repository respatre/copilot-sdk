name: Deploy DevFlow

on:
  push:
    branches: [main]
    paths:
      - "apps/**"
      - ".github/workflows/deploy-devflow.yml"

  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Deploy to production
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: root
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: /opt/devflow/deploy.sh
